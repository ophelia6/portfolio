<!DOCTYPE html>
<html>
<head>
    <title>Contact Manager</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            min-height: 100vh;
        }

        .page-header {
            background: linear-gradient(135deg, #1e1e3f 0%, #3b3486 100%);
            padding: 18px 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .header-count {
            font-size: 12px;
            font-weight: 600;
            color: #a5b4fc;
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 36px 24px;
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* ── Cards ── */
        .card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-body { padding: 24px; }

        /* ── Form ── */
        .field-group { margin-bottom: 18px; }

        .field-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
        }

        .field-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            color: #1e293b;
            font-family: inherit;
            transition: border-color 0.18s, box-shadow 0.18s;
            background: #fff;
            outline: none;
        }

        .field-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        .field-group input.input-error { border-color: #dc2626; }

        .error-msg {
            font-size: 12px;
            color: #dc2626;
            margin-top: 5px;
            min-height: 16px;
        }

        .form-actions { display: flex; gap: 10px; margin-top: 8px; }

        .btn-submit {
            flex: 1;
            padding: 11px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 4px 10px rgba(99,102,241,0.3);
        }

        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-cancel {
            padding: 11px 18px;
            background: transparent;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.18s;
        }

        .btn-cancel:hover { background: #f1f5f9; }

        /* ── Contacts table ── */
        .empty-state {
            padding: 56px 24px;
            text-align: center;
        }

        .empty-icon { font-size: 48px; margin-bottom: 12px; }

        .empty-text {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.15s;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f8fafc; }

        tbody td {
            padding: 14px 16px;
            font-size: 14px;
            color: #334155;
            vertical-align: middle;
        }

        .td-name { font-weight: 600; color: #1e293b; }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            vertical-align: middle;
            flex-shrink: 0;
        }

        .name-cell { display: flex; align-items: center; }

        .action-cell { text-align: right; white-space: nowrap; }

        .btn-edit, .btn-delete {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.18s, transform 0.15s;
        }

        .btn-edit {
            background: #eff6ff;
            color: #2563eb;
            margin-right: 6px;
        }

        .btn-edit:hover { background: #dbeafe; }

        .btn-delete {
            background: #fff1f2;
            color: #dc2626;
        }

        .btn-delete:hover { background: #fee2e2; }

        /* ── Edit mode highlight ── */
        .editing-row { background: #f5f3ff !important; }

        @media (max-width: 768px) {
            .wrapper { grid-template-columns: 1fr; }
            .page-header { padding: 16px 20px; }
        }
    </style>
</head>
<body>

<div class="page-header">
    <div class="header-title">Contact Manager</div>
    <div class="header-count" id="header-count">0 contacts</div>
</div>

<div class="wrapper">
    <!-- Form panel -->
    <div class="card">
        <div class="card-header">
            <span id="form-mode-title">Add Contact</span>
        </div>
        <div class="card-body">
            <form id="contact-form" onsubmit="return handleSubmit();">
                <div class="field-group">
                    <label>Full Name</label>
                    <input type="text" class="fname" id="input-name" placeholder="e.g. Jane Smith" autocomplete="off">
                    <div class="error-msg" id="name-error"></div>
                </div>
                <div class="field-group">
                    <label>Phone Number</label>
                    <input type="text" class="fnum" id="input-num" placeholder="10-digit number" autocomplete="off">
                    <div class="error-msg" id="num-error"></div>
                </div>
                <div class="field-group">
                    <label>Email Address</label>
                    <input type="text" class="fmail" id="input-email" placeholder="e.g. jane@example.com" autocomplete="off">
                    <div class="error-msg" id="email-error"></div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-submit" id="submit-btn">Add Contact</button>
                    <button type="button" class="btn-cancel" id="cancel-btn" onclick="cancelEdit()" style="display:none">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Contacts panel -->
    <div class="card">
        <div class="card-header">Contacts</div>
        <div id="empty-state" class="empty-state">
            <div class="empty-icon">&#128101;</div>
            <div class="empty-text">No contacts yet.<br>Add your first contact using the form.</div>
        </div>
        <table id="contacts-table" style="display:none">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // ── Helpers ──────────────────────────────────────────────
    const getEl = (sel) => document.querySelector(sel);
    const getById = (id) => document.getElementById(id);

    const isRequired = (val) => val.trim() !== '';
    const validatePhone = (val) => /^\d{10}$/.test(val.trim());
    const validateEmail = (val) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val.trim());

    const showError = (id, msg) => {
        const el = getById(id);
        el.textContent = msg;
        const inputId = { 'name-error': 'input-name', 'num-error': 'input-num', 'email-error': 'input-email' }[id];
        if (inputId) getById(inputId).classList.add('input-error');
    };

    const clearError = (id) => {
        const el = getById(id);
        if (el) el.textContent = '';
        const inputId = { 'name-error': 'input-name', 'num-error': 'input-num', 'email-error': 'input-email' }[id];
        if (inputId) getById(inputId).classList.remove('input-error');
    };

    const clearAllErrors = () => {
        ['name-error', 'num-error', 'email-error'].forEach(clearError);
    };

    const clearForm = () => {
        getById('input-name').value = '';
        getById('input-num').value = '';
        getById('input-email').value = '';
        clearAllErrors();
    };

    const getInitials = (name) => {
        const parts = name.trim().split(' ');
        return parts.length >= 2
            ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
            : name.trim().slice(0, 2).toUpperCase();
    };

    // ── Storage ──────────────────────────────────────────────
    let contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
    let editingId = null;

    const saveContacts = () => {
        localStorage.setItem('contacts', JSON.stringify(contacts));
    };

    // ── Render ───────────────────────────────────────────────
    const render = () => {
        const tbody = getById('table-body');
        const table = getById('contacts-table');
        const empty = getById('empty-state');
        const countEl = getById('header-count');

        countEl.textContent = contacts.length + (contacts.length === 1 ? ' contact' : ' contacts');

        if (contacts.length === 0) {
            table.style.display = 'none';
            empty.style.display = 'block';
            return;
        }

        empty.style.display = 'none';
        table.style.display = 'table';

        tbody.innerHTML = contacts.map(c => `
            <tr id="row-${c.id}" class="${editingId === c.id ? 'editing-row' : ''}">
                <td class="td-name">
                    <div class="name-cell">
                        <div class="avatar">${getInitials(c.name)}</div>
                        ${c.name}
                    </div>
                </td>
                <td>${c.phone}</td>
                <td>${c.email}</td>
                <td class="action-cell">
                    <button class="btn-edit" onclick="startEdit(${c.id})">&#9998; Edit</button>
                    <button class="btn-delete" onclick="deleteContact(${c.id})">&#10005; Delete</button>
                </td>
            </tr>
        `).join('');
    };

    // ── Add / Update ─────────────────────────────────────────
    const handleSubmit = () => {
        clearAllErrors();
        const name  = getById('input-name').value;
        const phone = getById('input-num').value;
        const email = getById('input-email').value;

        let valid = true;

        if (!isRequired(name)) {
            showError('name-error', 'Name is required.');
            valid = false;
        }
        if (!isRequired(phone) || !validatePhone(phone)) {
            showError('num-error', 'Enter a valid 10-digit phone number.');
            valid = false;
        }
        if (!isRequired(email) || !validateEmail(email)) {
            showError('email-error', 'Enter a valid email address.');
            valid = false;
        }

        if (!valid) return false;

        if (editingId !== null) {
            const idx = contacts.findIndex(c => c.id === editingId);
            if (idx > -1) {
                contacts[idx] = { id: editingId, name: name.trim(), phone: phone.trim(), email: email.trim() };
            }
            editingId = null;
            getById('form-mode-title').textContent = 'Add Contact';
            getById('submit-btn').textContent = 'Add Contact';
            getById('cancel-btn').style.display = 'none';
        } else {
            const newId = contacts.length > 0 ? Math.max(...contacts.map(c => c.id)) + 1 : 1;
            contacts.push({ id: newId, name: name.trim(), phone: phone.trim(), email: email.trim() });
        }

        saveContacts();
        clearForm();
        render();
        return false;
    };

    // ── Edit ─────────────────────────────────────────────────
    const startEdit = (id) => {
        const contact = contacts.find(c => c.id === id);
        if (!contact) return;

        editingId = id;
        getById('input-name').value  = contact.name;
        getById('input-num').value   = contact.phone;
        getById('input-email').value = contact.email;
        clearAllErrors();

        getById('form-mode-title').textContent = 'Edit Contact';
        getById('submit-btn').textContent = 'Save Changes';
        getById('cancel-btn').style.display = 'inline-block';

        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const cancelEdit = () => {
        editingId = null;
        clearForm();
        getById('form-mode-title').textContent = 'Add Contact';
        getById('submit-btn').textContent = 'Add Contact';
        getById('cancel-btn').style.display = 'none';
        render();
    };

    // ── Delete ───────────────────────────────────────────────
    const deleteContact = (id) => {
        contacts = contacts.filter(c => c.id !== id);
        if (editingId === id) cancelEdit();
        saveContacts();
        render();
    };

    // ── Init ─────────────────────────────────────────────────
    render();
</script>
</body>
</html>
